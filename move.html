<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>창고이동 — 자재팀</title>
<meta name="theme-color" content="#1e3264">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  *{box-sizing:border-box;font-family:'Malgun Gothic','맑은 고딕',-apple-system,system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:#eef2f7;color:#0f172a;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  #hdr{flex-shrink:0;z-index:10;background:linear-gradient(180deg,#274680,#1e3264);color:#fff;padding:10px 12px;padding-top:calc(10px + env(safe-area-inset-top,0px));display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 10px rgba(15,23,42,.28)}
  .hrow{display:flex;align-items:center;gap:8px}
  .hrow-title{justify-content:space-between}
  #hdr h1{font-size:17px;margin:0;font-weight:800;letter-spacing:.3px;white-space:nowrap}
  .pill{background:rgba(255,255,255,.18);padding:5px 12px;border-radius:999px;font-size:14px;font-weight:700;white-space:nowrap}
  .h-icon{min-height:40px;min-width:42px;padding:0 10px;border:none;border-radius:8px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);color:#fff;font-size:18px;font-weight:800;cursor:pointer}
  #content{flex:1;overflow:auto;padding:0 0 72px}
  .empty{padding:50px 20px;text-align:center;color:#94a3b8;font-size:19px}
  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:11px 20px;border-radius:10px;font-size:16px;opacity:0;transition:opacity .25s;z-index:50;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.32)}
  #toast.show{opacity:.96}
  .sticktop{position:sticky;top:0;z-index:8;background:#eef2f7;box-shadow:0 3px 6px rgba(15,23,42,.08);padding:6px 8px;display:flex;flex-direction:column;gap:6px}
  /* 창고 선택 (출고/입고 세로 2줄) */
  .whcol{display:flex;flex-direction:column;gap:6px}
  .whline{display:flex;align-items:center;gap:8px}
  .whtag{flex-shrink:0;width:62px;text-align:center;font-size:13px;font-weight:800;padding:9px 0;border-radius:9px}
  .whtag.out{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);color:#fff}
  .whtag.in{background:#16a34a;color:#fff}
  .whsel{flex:1;min-width:0;font-size:15px;padding:9px 8px;border-radius:9px;border:1.5px solid #c9d4e8;background:#fff;color:#0f172a;min-height:44px}
  .ptbl2{width:100%;border-collapse:separate;border-spacing:0;background:#fff;font-size:16px}
  .ptbl2 th,.ptbl2 td{border-bottom:1px solid #e5e7eb;border-right:1px solid #e5e7eb;padding:9px 8px;text-align:center;vertical-align:top}
  .ptbl2 thead th{background:#1e3264;color:#fff;font-size:15px;position:sticky;top:0}
  .ptbl2 .pcol2{text-align:left}
  .pno2{font-family:ui-monospace,monospace;font-weight:800;color:#1e3264;font-size:18px}
  .pnm{font-size:12px;color:#64748b;white-space:normal;max-width:200px;line-height:1.25;margin-top:1px}
  .qty{font-size:21px;font-weight:800}
  .loc-tag{display:inline-block;font-size:12px;color:#b45309;font-weight:800;margin-top:2px;background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:1px 7px}
  /* 확인 모달 */
  #cfmModal{display:none;position:fixed;inset:0;z-index:150;background:rgba(15,23,42,.62);align-items:center;justify-content:center;padding:18px}
  #cfmModal.open{display:flex}
  .cfm-box{background:#fff;border-radius:16px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.45)}
  .cfm-hd{background:#dc2626;color:#fff;font-weight:800;font-size:18px;padding:14px 18px}
  .cfm-bd{padding:18px;font-size:16px;color:#0f172a;line-height:1.55;white-space:pre-line}
  .cfm-ft{display:flex;gap:10px;padding:0 16px 16px}
  .cfm-ft button{flex:1;min-height:52px;border:none;border-radius:11px;font-size:17px;font-weight:800;cursor:pointer}
  .cfm-cancel{background:#f1f5f9;color:#64748b}
  .cfm-ok{background:#dc2626;color:#fff}
</style>
</head>
<body>
  <div id="hdr">
    <div class="hrow hrow-title">
      <span style="display:flex;align-items:center;gap:8px">
        <button class="h-icon" onclick="location.href='index.html'" title="메뉴">←</button>
        <h1>🔀 창고이동</h1>
      </span>
      <span style="display:flex;align-items:center;gap:8px"><span id="mes-who"></span><span class="pill" id="sum">-</span></span>
    </div>
    <div class="whcol">
      <label class="whline"><span class="whtag out">📤 출고</span>
        <select id="f-out" class="whsel" onchange="onWhChange()"><option value="">출고창고 불러오는 중…</option></select>
      </label>
      <label class="whline"><span class="whtag in">📥 입고</span>
        <select id="f-in" class="whsel" onchange="onWhChange()"><option value="">입고창고 선택</option></select>
      </label>
    </div>
  </div>
  <div id="content"><div class="empty">불러오는 중...</div></div>
  <div id="toast"></div>

  <div id="cfmModal" onclick="if(event.target===this)_cfmClose(false)">
    <div class="cfm-box">
      <div class="cfm-hd" id="cfm-title">⚠️ 확인</div>
      <div class="cfm-bd" id="cfm-msg"></div>
      <div class="cfm-ft">
        <button class="cfm-cancel" onclick="_cfmClose(false)">취소</button>
        <button class="cfm-ok" onclick="_cfmClose(true)">그래도 진행</button>
      </div>
    </div>
  </div>

<script src="js/api.js"></script>
<script src="js/mes-auth.js"></script>
<script>
'use strict';

// ── 창고 목록 조회 (필요투입과 동일한 분리 워크플로우, 신규 라우트) ──
const MES_MOVE = {
  N8N: 'https://aitechn8n.ngrok.app/webhook',
  async warehouses(){
    const r = await fetch(`${this.N8N}/ait/mes/warehouses`, {cache:'no-store'});
    if(!r.ok) throw new Error('warehouses '+r.status);
    const t = await r.text();
    return t ? JSON.parse(t) : [];
  }
};

let _busy=false, _scanPending={}, _locMap={};   // _scanPending[label]={sysitem,item,name,lot,qty}
function fmtQty(n){ n=Math.round(Number(n)*1000)/1000; return n.toLocaleString('en-US',{maximumFractionDigits:3}); }
function esc1(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function beepErr(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(); o.frequency.value=220; o.connect(a.destination); o.start(); setTimeout(()=>{o.stop();a.close();},180);}catch(_){ } }
function focusScan(){ const si=document.getElementById('scan'); if(si) si.focus({preventScroll:true}); }
function outWh(){ return document.getElementById('f-out').value; }
function inWh(){ return document.getElementById('f-in').value; }
function locTag(pn){ const o=_locMap[pn]; return (o&&o.loc)?`<div class="loc-tag">📍 ${o.loc}</div>`:''; }

// ── 스타일 확인 모달 (Promise<boolean>) ──
let _cfmResolve=null;
function askConfirm(title,msg){
  return new Promise(res=>{ _cfmResolve=res;
    document.getElementById('cfm-title').textContent=title;
    document.getElementById('cfm-msg').textContent=msg;
    document.getElementById('cfmModal').classList.add('open'); });
}
function _cfmClose(v){ document.getElementById('cfmModal').classList.remove('open'); const r=_cfmResolve; _cfmResolve=null; if(r) r(v); }

// ── 스캔한 박스 누적 (품번별 그룹) ──
function pending(){ return Object.values(_scanPending); }
function pendTotals(){ const labels=Object.keys(_scanPending); const pns=new Set(pending().map(b=>b.item)); return {boxes:labels.length, pns:pns.size}; }
function groupByPart(){
  const g={};
  for(const b of pending()){
    const pn=b.item; const o=(g[pn]=g[pn]||{pn, name:b.name||'', qty:0, boxes:0, boxlist:[]});
    o.qty+=Number(b.qty)||0; o.boxes++; o.boxlist.push(b);
  }
  return Object.values(g).sort((a,b)=>String(a.pn).localeCompare(String(b.pn),undefined,{numeric:true}));
}
function cancelLabel(label){ if(!_scanPending[label]) return; delete _scanPending[label]; toast('저장대기 취소'); render(); focusScan(); }
// 박스별 이동수량 수정 (0<수량<=박스원수량). MES가 라벨을 분할 처리
function setBoxQty(label,val){
  const b=_scanPending[label]; if(!b) return;
  let v=Number(val); if(!isFinite(v)||v<0) v=0;
  if(v>b.max){ v=b.max; toast(`박스 수량(${fmtQty(b.max)})보다 많을 수 없어요`); beepErr(); }
  b.qty=v; render(); focusScan();
}

// ── 스캔: 박스라벨 → 선택 출고창고에서 조회 → 누적 ──
async function onScan(){
  const inp=document.getElementById('scan'); if(!inp) return;
  const label=inp.value.trim(); inp.value='';
  if(!label){ inp.focus(); return; }
  if(!outWh()){ toast('출고창고를 선택하세요!!'); beepErr(); inp.focus(); return; }
  // 이미 스캔된 라벨 재스캔 → 취소(토글)
  if(_scanPending[label]){ const cq=Number(_scanPending[label].qty)||0; delete _scanPending[label]; toast(`재스캔 취소 −${fmtQty(cq)}`); render(); focusScan(); return; }
  let r; try{ r=await AIT_API.labelInfo(label, outWh()); }catch(e){ toast('조회 오류: '+(e.message||e)); inp.focus(); return; }
  if(!r||!r.ok){ toast('출고창고에 없는 라벨입니다'); beepErr(); inp.focus(); return; }
  const q=Number(r.qty)||0;
  if(!q){ toast('수량이 0인 라벨입니다'); beepErr(); inp.focus(); return; }
  _scanPending[label]={sysitem:r.sysitem, item:String(r.item), name:r.name||'', lot:r.lot, qty:q, max:q, label};
  toast(`${r.item} +1박스 (${fmtQty(q)})`);
  refreshLocs(); render(); focusScan();
}

async function saveMoves(){
  if(_busy) return;
  if(!outWh()){ toast('출고창고를 선택하세요!!'); return; }
  if(!inWh()){ toast('입고창고를 선택하세요!!'); return; }
  if(outWh()===inWh()){ toast('출고창고와 입고창고가 같습니다'); return; }
  const t=pendTotals(); if(!t.boxes){ toast('스캔된 박스가 없습니다'); return; }
  const outNm=document.getElementById('f-out').selectedOptions[0].textContent;
  const inNm=document.getElementById('f-in').selectedOptions[0].textContent;
  // 이동수량 0 박스는 제외. 부분수량이 하나라도 있으면 안내 문구 추가
  const movable=pending().filter(b=>Number(b.qty)>0);
  if(!movable.length){ toast('이동수량이 0입니다'); beepErr(); return; }
  const hasPartial=movable.some(b=>Number(b.qty)<Number(b.max));
  const partialNote=hasPartial?'\n\n⚠️ 일부 박스는 부분수량 이동입니다.\nMES에서 박스라벨이 분할됩니다.':'';
  const ok=await askConfirm('🔀 이동처리',
    `${outNm}\n  → ${inNm}\n\n${t.pns}품목 · ${movable.length}박스${partialNote}\n\n해당 정보를 이동처리 하시겠습니까?`);
  if(!ok) return;
  const boxes=movable.map(b=>({sysitem:b.sysitem,label:b.label,lot:b.lot,qty:b.qty}));
  _busy=true; toast(`이동 처리 중... (${t.boxes}박스)`);
  try{
    const res=await AIT_API.stockMove({out_wh:outWh(),in_wh:inWh(),emp:MES_AUTH.emp,boxes});
    if(res&&res.ok){
      toast('이동 완료 ('+res.no_stwm+')');
      _scanPending={}; render();
    } else { toast('이동 실패: '+((res&&res.error)||'오류')); beepErr(); }
  }catch(e){ toast('이동 오류: '+(e.message||e)); beepErr(); }
  finally{ _busy=false; focusScan(); }
}

function onWhChange(){ render(); focusScan(); }

// 적재위치 태그 (있으면 표시) — 출고요청 화면과 동일 소스 재사용
function refreshLocs(){
  const parts=[...new Set(pending().map(b=>b.item).filter(Boolean))];
  if(!parts.length) return;
  AIT_API.getPartLocations(parts)
    .then(m=>{ _locMap=(m&&typeof m==='object'&&!Array.isArray(m))?m:{}; render(); })
    .catch(()=>{});
}

function render(){
  const wrap=document.getElementById('content');
  const pt=pendTotals();
  const parts=groupByPart();
  document.getElementById('sum').textContent=pt.boxes?`${pt.pns}품목·${pt.boxes}박스`:'대기 0';
  const toolbar=`<div class="sticktop">
    <input id="scan" placeholder="📷 박스라벨 스캔 (PDA)" autocomplete="off" inputmode="none" virtualkeyboardpolicy="manual"
      style="width:100%;font-size:15px;padding:9px 12px;border:2px solid #1e3264;border-radius:10px;min-height:42px;font-family:ui-monospace,monospace"
      onkeydown="if(event.key==='Enter'){event.preventDefault();onScan()}">
    <button onclick="saveMoves()" ${pt.boxes?'':'disabled'} style="width:100%;min-height:42px;border-radius:9px;font-size:15px;font-weight:800;cursor:pointer;border:none;color:#fff;background:${pt.boxes?'#1e3264':'#cbd5e1'}">🔀 이동 저장${pt.boxes?` (${pt.boxes}박스·${pt.pns}품목)`:''}</button>
  </div>`;
  if(!parts.length){ wrap.innerHTML=toolbar+'<div class="empty">출고창고·입고창고를 고르고<br>박스라벨을 스캔하세요</div>'; focusScan(); return; }
  let body=`<table class="ptbl2"><thead><tr><th style="text-align:left">부품</th><th style="min-width:70px">이동수량</th><th style="min-width:118px">박스별 수량</th></tr></thead><tbody>`;
  parts.forEach(g=>{
    const boxRows=g.boxlist.map(b=>{
      const partial=Number(b.qty)<Number(b.max);
      return `<div style="display:flex;align-items:center;gap:4px;margin:3px 0;justify-content:flex-end">
        <span style="font-family:ui-monospace;font-size:11px;color:#64748b" title="라벨 ${esc1(b.label)}">…${String(b.label).slice(-4)}</span>
        <input type="number" value="${b.qty}" min="0" max="${b.max}" step="any" inputmode="decimal"
          onfocus="this.select()" onchange="setBoxQty('${esc1(b.label)}',this.value)"
          style="width:60px;font-size:14px;padding:4px 5px;border:1.5px solid ${partial?'#d97706':'#1e3264'};border-radius:7px;text-align:right;font-family:ui-monospace;color:${partial?'#b45309':'#0f172a'};font-weight:700">
        <span style="font-size:10px;color:#94a3b8;white-space:nowrap">/${fmtQty(b.max)}</span>
        <button onclick="cancelLabel('${esc1(b.label)}')" title="이 박스 취소" style="border:none;background:#fee2e2;color:#b91c1c;border-radius:6px;width:22px;height:22px;font-size:11px;cursor:pointer;flex-shrink:0">✕</button>
      </div>`;
    }).join('');
    body+=`<tr>
      <td class="pcol2"><span class="pno2">${g.pn}</span><div class="pnm">${g.name||''}</div>${locTag(g.pn)}</td>
      <td><div class="qty" style="color:#1d4ed8">${fmtQty(g.qty)}</div><div style="font-size:11px;color:#64748b">${g.boxes}박스</div></td>
      <td>${boxRows}</td>
    </tr>`;
  });
  body+='</tbody></table>';
  wrap.innerHTML=toolbar+body;
  focusScan();
}

// ── 창고 목록 동적 로드 ──
async function loadWarehouses(){
  const so=document.getElementById('f-out'), si=document.getElementById('f-in');
  try{
    const whs=await MES_MOVE.warehouses();
    // N으로 시작하는 창고코드=고객창고 → 목록에서 제외
    const list=Array.isArray(whs)?whs.filter(w=>w&&w.code&&!/^N/i.test(String(w.code))):[];
    if(!list.length) throw new Error('empty');
    list.sort((a,b)=>String(a.name||a.code).localeCompare(String(b.name||b.code),'ko',{numeric:true}));
    const opt=(ph)=>`<option value="">${ph}</option>`+list.map(w=>`<option value="${esc1(w.code)}">${w.name||''} (${w.code})</option>`).join('');
    so.innerHTML=opt('📤 출고창고 선택');
    si.innerHTML=opt('📥 입고창고 선택');
  }catch(e){
    so.innerHTML='<option value="">출고창고 로드 실패</option>';
    si.innerHTML='<option value="">입고창고 로드 실패</option>';
    toast('창고 목록 로드 실패');
  }
}

(function init(){
  MES_AUTH.ready(async ()=>{
    const w=document.getElementById('mes-who'); if(w) w.innerHTML=MES_AUTH.chipHtml();
    await loadWarehouses();
    render();
  });
})();
</script>
</body>
</html>
